<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请假管理系统 - 管理后台</title>
    <!-- Use local css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div id="admin-app" class="admin-container">
        <!-- Login View Container -->
        <div id="login-container" class="login-wrapper" style="display: none;">
            <!-- Login will be injected here -->
        </div>

        <!-- Main Layout Container -->
        <div id="main-layout" class="main-layout" style="display: none;">
            <!-- Top Header -->
            <header class="top-header">
                <div class="logo">
                    <i data-lucide="calendar-check"></i>
                    <span class="app-title">请假管理系统 <small>Portal</small></span>
                </div>
                <div class="user-info" id="top-user-info">
                    <!-- User info injected here -->
                </div>
            </header>

            <div class="body-wrapper">
                <!-- Sidebar Navigation -->
                <aside class="sidebar" id="sidebar">
                    <button class="sidebar-toggle" id="sidebarToggle" title="收起/展开菜单">
                        <i data-lucide="panel-left"></i>
                    </button>
                    <nav class="side-nav">
                        <a href="#/" class="nav-item" data-tooltip="仪表盘">
                            <i data-lucide="layout-dashboard"></i>
                            <span class="menu-text">仪表盘</span>
                        </a>
                        <a href="#/leave/apply" class="nav-item" data-tooltip="请假申请">
                            <i data-lucide="plus-square"></i>
                            <span class="menu-text">请假申请</span>
                        </a>
                        <a href="#/leave/list" class="nav-item" data-tooltip="我的记录">
                            <i data-lucide="clipboard-list"></i>
                            <span class="menu-text">我的记录</span>
                        </a>
                        <div class="nav-divider is-manager"></div>
                        <a href="#/audit" class="nav-item is-manager" id="nav-audit" data-tooltip="审批中心">
                            <i data-lucide="check-circle"></i>
                            <span class="menu-text">审批中心</span>
                        </a>
                        <div class="nav-divider is-hr"></div>
                        <a href="#/admin/users" class="nav-item is-hr" data-tooltip="员工管理">
                            <i data-lucide="users"></i>
                            <span class="menu-text">员工管理</span>
                        </a>
                        <a href="#/admin/leave-types" class="nav-item is-hr" data-tooltip="假期配置">
                            <i data-lucide="settings-2"></i>
                            <span class="menu-text">假期配置</span>
                        </a>
                        <a href="#/admin/entitlements" class="nav-item is-hr" data-tooltip="额度调整">
                            <i data-lucide="bar-chart-3"></i>
                            <span class="menu-text">额度调整</span>
                        </a>
                    </nav>
                    <div class="sidebar-footer">
                        <a href="javascript:Auth.logout()" class="logout-btn" data-tooltip="安全退出">
                            <i data-lucide="log-out"></i>
                            <span class="menu-text">安全退出</span>
                        </a>
                    </div>
                </aside>

                <!-- Main Content Area -->
                <main class="content-area">
                    <div id="page-content" class="fade-in"></div>
                </main>
            </div>
        </div>
    </div>

    <!-- Global Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Use local JS -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/router.js"></script>
    <!-- Admin specific JS -->
    <script src="assets/js/app.js"></script>
</body>

</html>
